<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ViewEC 網紅社群組 Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --ink:#2B2B2B; --ink-soft:#6B6B6B; --muted:#9A9A9A;
  --bg:#F7F7F7; --card:#FFFFFF;
  --blue:#61A6E1; --blue-soft:#EAF2FA; --blue-text:#3D7FB8;
  --gray:#D9D9D9; --gray-mid:#E4E4E4; --gray-text:#7A7A7A;
  --rose:#C9A9A4; --rose-soft:#F1E9E7; --rose-text:#8A6B63;
  --line:#E5E5E5;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;}
.mono{font-family:'Inter',sans-serif;}
.shell{display:flex;min-height:100vh;padding:20px;gap:20px;max-width:1400px;margin:0 auto;}

/* Sidebar */
.sidebar{width:150px;background:var(--ink);border-radius:24px;padding:22px 14px;display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
.sidebar .logo{color:#fff;font-weight:800;font-size:15px;margin:0 8px 26px;letter-spacing:.01em;}
#topnav{display:flex;flex-direction:column;gap:4px;}
#topnav button{border:none;background:transparent;color:#ACA9A9;font-family:'Inter';font-size:13px;font-weight:600;padding:11px 14px;border-radius:12px;cursor:pointer;text-align:left;width:100%;}
#topnav button.active{background:#fff;color:var(--ink);}
#topnav button:hover:not(.active){background:#3D3D3D;color:#fff;}

/* Main */
.main{flex:1;min-width:0;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap;}
.topbar .greet{font-size:17px;font-weight:700;}
.meta{font-size:11.5px;color:var(--ink-soft);display:flex;align-items:center;gap:10px;}
#refreshBtn{font-size:11.5px;padding:8px 16px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-weight:600;}
#refreshBtn:hover{background:var(--blue-soft);border-color:var(--blue);color:var(--blue-text);}
#refreshBtn:disabled{opacity:.6;cursor:default;}

/* Tabs */
.tabpanel{display:none;}
.tabpanel.active{display:block;}

/* Overview hero */
.hero h1{font-size:19px;font-weight:700;margin:0 0 24px;}
.bignum-row{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap;}
.bignum{width:200px;box-sizing:border-box;padding:22px 24px;border-radius:20px;text-align:left;background:var(--card);border:1px solid var(--line);}
.bignum:first-child{background:var(--ink);border-color:var(--ink);}
.bignum:first-child .num{color:#fff;}
.bignum:first-child .label{color:rgba(255,255,255,.68);}
.bignum .num{font-weight:800;font-size:28px;line-height:1;white-space:nowrap;}
.bignum .label{font-size:12px;color:var(--ink-soft);margin-top:8px;white-space:nowrap;}

.service-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.service-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:22px 24px;cursor:pointer;transition:box-shadow .15s,transform .15s;}
.service-card:hover{box-shadow:0 8px 20px rgba(43,43,43,.06);transform:translateY(-2px);}
.service-card .tag{display:inline-block;font-size:11px;padding:4px 12px;border-radius:999px;font-weight:600;margin-bottom:14px;}
.service-card h3{font-size:16px;margin:0 0 14px;font-weight:700;}
.service-card .srow{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px dashed var(--line);}
.service-card .srow:last-of-type{border-bottom:none;}
.service-card .srow .k{color:var(--ink-soft);}
.service-card .srow .v{font-weight:600;}
.service-card .cta{margin-top:14px;font-size:12px;color:var(--blue-text);font-weight:700;}

.section-label{font-size:11.5px;letter-spacing:.05em;color:var(--ink-soft);text-transform:uppercase;margin:0 0 12px;font-weight:600;}

/* KPI cards */
.kpi-row{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap;}
.kpi{width:200px;cursor:default;}
.kpi.clickable{cursor:pointer;}
.kpi .num{font-weight:800;font-size:28px;line-height:1;white-space:nowrap;}
.kpi .label{font-size:11.5px;color:var(--ink-soft);margin-top:7px;white-space:nowrap;}
.kpi.clickable .label{color:var(--blue-text);}
.kpi.clickable:hover .num{opacity:.75;}
.kpi.boxed{box-sizing:border-box;padding:18px 22px;border-radius:18px;text-align:left;background:var(--card);border:1px solid var(--line);}
.kpi-row .kpi:first-child.boxed{background:var(--ink);border-color:var(--ink);}
.kpi-row .kpi:first-child .num{color:#fff;}
.kpi-row .kpi:first-child .label{color:rgba(255,255,255,.68);}

/* Filter pills */
.filter-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.pill{font-size:12.5px;padding:8px 17px;border-radius:999px;background:var(--ink);color:#fff;cursor:pointer;border:1px solid var(--ink);font-weight:500;}
.pill.inactive{background:var(--card);color:var(--ink-soft);border-color:var(--line);}
.spacer{flex:1;}
.search-bar input{padding:9px 14px;border:1px solid var(--line);border-radius:999px;font-family:'Inter';font-size:13px;background:var(--card);width:210px;}

/* Table */
table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;}
thead th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.02em;color:var(--ink-soft);padding:12px 14px;border-bottom:1px solid var(--line);background:#FAFAFA;font-weight:600;white-space:nowrap;}
tbody td{padding:12px 14px;border-bottom:1px solid var(--line);font-size:12.5px;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#FAFAFA;}
.status-tag{font-size:11px;padding:4px 12px;border-radius:999px;font-weight:600;white-space:nowrap;}
.status-tag.合作中{background:var(--blue-soft);color:var(--blue-text);}
.status-tag.提案中{background:var(--gray-mid);color:var(--gray-text);}
.status-tag.已結案{background:#EFEFEF;color:var(--muted);}
.status-tag.不合作{background:var(--rose-soft);color:var(--rose-text);}
.status-tag.停滯中{background:#F0F0F0;color:var(--ink-soft);}
.name-cell .name{font-weight:600;}
.name-cell .proj{font-size:11px;color:var(--ink-soft);}
.profit.pos{color:var(--blue-text);font-weight:600;}
.detail-link{font-size:11.5px;color:var(--blue-text);text-decoration:underline;cursor:pointer;}
.note-cell{color:var(--ink-soft);font-size:12px;}

/* Sub-views */
.subview{display:none;}
.subview.active{display:block;}
.back-link{font-size:12.5px;color:var(--ink-soft);cursor:pointer;margin-bottom:16px;display:inline-block;}
.back-link:hover{color:var(--ink);}

/* Project drilldown */
.proj-toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;position:relative;}
.pm-dropdown{position:relative;}
.pm-dropdown-btn{font-size:12.5px;padding:9px 16px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:500;}
.pm-dropdown-btn::after{content:'▾';font-size:10px;color:var(--ink-soft);}
.pm-dropdown-panel{display:none;position:absolute;right:0;top:calc(100% + 6px);background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px;min-width:160px;box-shadow:0 10px 28px rgba(43,43,43,.12);z-index:10;}
.pm-dropdown-panel.open{display:block;}
.pm-option{display:flex;align-items:center;gap:8px;padding:7px 8px;font-size:12.5px;border-radius:8px;cursor:pointer;}
.pm-option:hover{background:#FAFAFA;}
.pm-option input{margin:0;}
.pm-dropdown-foot{display:flex;gap:8px;padding:7px 8px 2px;border-top:1px solid var(--line);margin-top:4px;}
.pm-dropdown-foot span{font-size:11px;color:var(--blue-text);cursor:pointer;}

.proj-card-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;margin-bottom:24px;}
.proj-card{flex:0 0 195px;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--muted);border-radius:14px;padding:16px 18px;cursor:pointer;transition:box-shadow .15s;}
.proj-card:hover{box-shadow:0 6px 16px rgba(43,43,43,.06);}
.proj-card.selected{box-shadow:0 0 0 1.5px var(--ink);}
.proj-card h4{font-size:15px;margin:0 0 9px;font-weight:700;}
.proj-card .prow{display:flex;justify-content:space-between;font-size:11.5px;padding:3px 0;}
.proj-card .prow .k{color:var(--ink-soft);}
.proj-card .prow.rev{margin-top:7px;padding-top:7px;border-top:1px dashed var(--line);}
.proj-card .prow.rev .v{font-weight:700;color:var(--blue-text);}
.stripe-合作中{border-left-color:var(--blue);}
.stripe-提案中{border-left-color:var(--muted);}
.stripe-停滯中{border-left-color:var(--rose);}
.stripe-已結案{border-left-color:var(--gray);}

.detail-panel{display:none;border-top:2px solid var(--ink);padding-top:22px;margin-top:4px;}
.detail-panel.open{display:block;}
.detail-title{font-size:18px;font-weight:700;margin:0 0 16px;}
.info-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 22px;margin-bottom:26px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.info-field .k{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.03em;}
.info-field .v{font-size:13.5px;margin-top:3px;}

/* Revenue drilldown */
.rev-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.chart-box{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;}
.chart-box h3{font-size:15px;margin:0 0 12px;font-weight:700;}
.chart-box.full{grid-column:1 / -1;}
.chart-filter{display:flex;gap:6px;margin-bottom:14px;}
.mini-toggle{font-size:11px;padding:5px 13px;border-radius:999px;border:1px solid var(--line);background:var(--bg);color:var(--ink-soft);cursor:pointer;font-weight:500;}
.mini-toggle.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.pm-table{width:100%;border-collapse:collapse;}
.pm-table th{text-align:left;font-size:11px;color:var(--ink-soft);padding:8px 10px;border-bottom:1px solid var(--line);font-weight:600;}
.pm-table td{padding:8px 10px;border-bottom:1px solid var(--line);font-size:12.5px;}
.pm-table tr:last-child td{border-bottom:none;}
.bar-mini{height:6px;border-radius:3px;background:var(--blue);margin-top:4px;}
.loading-state{padding:60px 20px;text-align:center;color:var(--ink-soft);font-size:13.5px;}
.error-state{padding:20px 24px;background:var(--rose-soft);color:var(--rose-text);border-radius:14px;font-size:13px;margin-bottom:20px;}
</style>
</head>
<body>
<div class="shell">

  <div class="sidebar">
    <div class="logo">ViewEC</div>
    <div id="topnav">
      <button class="active" data-tab="overview">總覽</button>
      <button data-tab="influencer">跨境網紅</button>
      <button data-tab="buyershow">買家秀</button>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="greet">網紅社群組 Dashboard</div>
      <div class="meta">最後更新 <span class="mono" id="lastUpdated">讀取中...</span>
        <button id="refreshBtn">↻ 強制更新</button>
      </div>
    </div>

    <div class="loading-state" id="loadingState">正在讀取 Google Sheet 資料...</div>
    <div id="errorState"></div>

    <div id="mainContent" style="display:none">
    <!-- OVERVIEW -->
    <div class="tabpanel active" id="tab-overview">
      <div class="hero">
        <h1>總覽</h1>
        <div class="bignum-row" id="overviewBignums"></div>
      </div>
      <div class="section-label">服務線</div>
      <div class="service-grid">
        <div class="service-card" onclick="switchTab('influencer')">
          <div class="tag" style="background:var(--blue-soft);color:var(--blue-text)">跨境網紅</div>
          <h3>Cross-border Influencer</h3>
          <div class="srow"><span class="k">進行中專案數</span><span class="v" id="ovInfProj"></span></div>
          <div class="srow"><span class="k">進行中影片數</span><span class="v" id="ovInfVideo"></span></div>
          <div class="srow"><span class="k">本月業績</span><span class="v" id="ovInfRev"></span></div>
          <div class="cta">查看細節 →</div>
        </div>
        <div class="service-card" onclick="switchTab('buyershow')">
          <div class="tag" style="background:var(--gray-mid);color:var(--gray-text)">買家秀</div>
          <h3>Buyer Show</h3>
          <div class="srow"><span class="k">進行中專案數</span><span class="v" id="ovBSProj"></span></div>
          <div class="srow"><span class="k">進行中影片數</span><span class="v" id="ovBSVideo"></span></div>
          <div class="srow"><span class="k">本月業績</span><span class="v" id="ovBSRev"></span></div>
          <div class="cta">查看細節 →</div>
        </div>
      </div>
    </div>

    <!-- INFLUENCER TAB -->
    <div class="tabpanel" id="tab-influencer"></div>

    <!-- BUYER SHOW TAB -->
    <div class="tabpanel" id="tab-buyershow"></div>
    </div>
  </div>
</div>

<script>
const APPSCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw-WSqn_fiXT8UBYZtF3G4Chyj2YAIdAXkv8fkvsHeZH8-QCVZLgctDLU6WkXt70lbckQ/exec';

/* ================= Shared helpers ================= */
function norm(s){ return String(s==null?'':s).replace(/[\s()（）／/]/g,''); }
function getVal(obj, candidates){
  for (const c of candidates){ if(obj[c]!==undefined && obj[c]!==null && obj[c]!=='') return obj[c]; }
  const keys = Object.keys(obj);
  for (const c of candidates){
    const nc = norm(c);
    for (const k of keys){ if(norm(k)===nc && obj[k]!==undefined && obj[k]!==null && obj[k]!=='') return obj[k]; }
  }
  return '';
}
function numOrZero(v){
  if(v===''||v===null||v===undefined) return 0;
  const n = typeof v==='number' ? v : parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? 0 : n;
}
function parseDate(v){
  if(!v) return null;
  if(v instanceof Date) return v;
  const m = String(v).match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if(!m) return null;
  return new Date(parseInt(m[1],10), parseInt(m[2],10)-1, parseInt(m[3],10));
}
function fmtD(n){ return '$'+Math.round(n).toLocaleString(); }
function statusTag(s){ const cls = s || '提案中'; return `<span class="status-tag ${cls}">${cls||'—'}</span>`; }
function profitCell(p){ return p>0 ? `<span class="profit pos">$${Math.round(p).toLocaleString()}</span>` : `<span class="profit">—</span>`; }
function moneyCell(amt, cur){
  if(amt===''||amt===null||amt===undefined||amt==='') return '<span class="mono">—</span>';
  return `<span class="mono">${amt}${cur?(' '+cur):''}</span>`;
}

function switchTab(name){
  document.querySelectorAll('.tabpanel').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('#topnav button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
}
document.querySelectorAll('#topnav button').forEach(b=> b.onclick = ()=> switchTab(b.dataset.tab));

/* ================= Mapping raw sheet rows into working objects ================= */
function mapProject(o){
  return {
    name: getVal(o,['廠商名稱']),
    service: getVal(o,['服務','服務線']),
    pm: getVal(o,['PM']),
    bizOps: getVal(o,['業務/營運PM','業務營運PM']) || getVal(o,['業務']),
    platform: getVal(o,['平台']) || '—',
    count: getVal(o,['需求人數']) || '—',
    due: getVal(o,['期望影片 完成時間','期望影片完成時間','預計合作時間']) || '—',
    demand: getVal(o,['需求說明']) || '—',
    coopTime: getVal(o,['填寫日期']) || '—',
    stage: '提案中',
  };
}
function mapItem(o){
  return {
    status: getVal(o,['狀態']) || '提案中',
    proj: getVal(o,['廠商名稱']),
    name: getVal(o,['網紅 / 產品名稱','網紅／產品名稱','網紅/產品名稱']),
    service: getVal(o,['服務','服務線']),
    pm: getVal(o,['PM']),
    bizOps: getVal(o,['業務/營運PM']),
    latest: getVal(o,['最新動態（自動帶入）','最新動態(自動帶入)','最新動態']) || '尚無更新',
    recog: getVal(o,['業績認列時間']) || '',
    partner: getVal(o,['配合服務商']) || '—',
    note: getVal(o,['備註']) || '—',
    costAmt: getVal(o,['成本金額']),
    costCur: getVal(o,['成本幣別']),
    quoteAmt: getVal(o,['對外報價金額']),
    quoteCur: getVal(o,['對外報價幣別']),
    quoteTWD: numOrZero(getVal(o,['對外報價(TWD)','對外報價TWD'])),
    costTWD: numOrZero(getVal(o,['成本(TWD)','成本TWD'])),
    profitTWD: numOrZero(getVal(o,['利潤(TWD)','利潤TWD'])),
  };
}

/* ================= Generic service board factory ================= */
function ServiceBoard(ns, cfg){
  const container = document.getElementById('tab-'+ns);
  container.innerHTML = `
    <div class="subview active" id="${ns}-view-main">
      <div class="kpi-row" id="${ns}-kpiRow"></div>

      <div class="section-label">狀態篩選</div>
      <div class="filter-row" id="${ns}-statusFilter">
        <div class="pill inactive" data-s="合作中">合作中</div>
        <div class="pill inactive" data-s="提案中">提案中</div>
        <div class="pill inactive" data-s="停滯中">停滯中</div>
        <div class="pill inactive" data-s="已結案">已結案</div>
        <div class="pill inactive" data-s="不合作">不合作</div>
        <div class="pill" data-s="全部">全部</div>
        <div class="spacer"></div>
        <div class="search-bar"><input type="text" id="${ns}-searchInput" placeholder="搜尋..."></div>
      </div>

      <div class="section-label">清單明細</div>
      <table><thead><tr>${cfg.columns.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
      <tbody id="${ns}-tbody"></tbody></table>
    </div>

    <div class="subview" id="${ns}-view-proj">
      <span class="back-link" onclick="boards['${ns}'].showSub('main')">← 返回總覽</span>
      <div class="proj-toprow">
        <div class="section-label" style="margin:0">全部專案（點卡片看細節）</div>
        <div class="pm-dropdown">
          <div class="pm-dropdown-btn" id="${ns}-pmDropdownBtn">PM 篩選：全部</div>
          <div class="pm-dropdown-panel" id="${ns}-pmDropdownPanel"></div>
        </div>
      </div>
      <div class="proj-card-row" id="${ns}-projCardRow"></div>
      <div class="detail-panel" id="${ns}-detailPanel">
        <div class="detail-title" id="${ns}-detailTitle"></div>
        <div class="section-label">基本資訊</div>
        <div class="info-box"><div class="info-grid" id="${ns}-infoGrid"></div></div>
        <div class="section-label">明細（此廠商的清單）</div>
        <table><thead><tr>${cfg.detailColumns.map(c=>`<th>${c.label}</th>`).join('')}</tr></thead>
        <tbody id="${ns}-projDetailBody"></tbody></table>
      </div>
    </div>

    <div class="subview" id="${ns}-view-rev">
      <span class="back-link" onclick="boards['${ns}'].showSub('main')">← 返回總覽</span>
      <div class="rev-grid">
        <div class="chart-box full">
          <h3>各月業績認列 / 成本 / 利潤（依業績認列時間統計）</h3>
          <div class="chart-filter" id="${ns}-revFilter">
            <div class="mini-toggle on" data-k="全部">全部</div>
            <div class="mini-toggle" data-k="業績">業績</div>
            <div class="mini-toggle" data-k="成本">成本</div>
            <div class="mini-toggle" data-k="利潤">利潤</div>
          </div>
          <canvas id="${ns}-revChart" height="80"></canvas>
        </div>
        <div class="chart-box">
          <h3>${cfg.newCountLabel}</h3>
          <canvas id="${ns}-newInfChart" height="140"></canvas>
        </div>
        <div class="chart-box">
          <h3>各 PM 執行數量</h3>
          <table class="pm-table" id="${ns}-pmTable"></table>
        </div>
      </div>
    </div>
  `;

  const rows = cfg.rows;
  const projects = cfg.projects;
  const logs = cfg.logs;
  const pmList = [...new Set(projects.map(p=>p.pm).filter(Boolean))];
  let activePMs = new Set(pmList);
  let selectedProj = null;
  let activeStatus = '全部';

  function showSub(name){
    ['main','proj','rev'].forEach(v=>document.getElementById(`${ns}-view-${v}`).classList.remove('active'));
    document.getElementById(`${ns}-view-${name}`).classList.add('active');
  }

  function renderTable(){
    const q = document.getElementById(`${ns}-searchInput`).value.toLowerCase();
    const tbody = document.getElementById(`${ns}-tbody`);
    tbody.innerHTML = rows.filter(r => (activeStatus==='全部' || r.status===activeStatus)
      && (!q || JSON.stringify(r).toLowerCase().includes(q)))
      .map(r => `<tr>${cfg.columns.map(c=>`<td>${c.render(r)}</td>`).join('')}</tr>`).join('')
      || `<tr><td colspan="${cfg.columns.length}" style="text-align:center;color:var(--ink-soft);padding:24px;">目前沒有符合的資料</td></tr>`;
  }
  document.querySelectorAll(`#${ns}-statusFilter .pill`).forEach(p=>{
    p.onclick = ()=>{
      document.querySelectorAll(`#${ns}-statusFilter .pill`).forEach(x=>x.classList.add('inactive'));
      p.classList.remove('inactive');
      activeStatus = p.dataset.s;
      renderTable();
    };
  });
  document.getElementById(`${ns}-searchInput`).addEventListener('input', renderTable);

  function kpiValue(type){
    const now = new Date();
    switch(type){
      case 'monthRev': return rows.filter(r=>{ const d=parseDate(r.recog); return d && d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth(); }).reduce((s,r)=>s+r.quoteTWD,0);
      case 'ongoingRev': return rows.filter(r=>r.status==='合作中').reduce((s,r)=>s+r.quoteTWD,0);
      case 'activeCount': return rows.filter(r=>r.status!=='已結案' && r.status!=='不合作').length;
      case 'projCount': return projects.length;
      case 'newCount': return computeNewCount();
    }
  }
  function isMoneyType(type){ return type==='monthRev' || type==='ongoingRev'; }
  function computeNewCount(){
    const now = new Date();
    let count = 0;
    rows.forEach(it=>{
      const matches = logs.filter(l => norm(l.proj)===norm(it.proj) && norm(l.name)===norm(it.name));
      if(matches.length===0) return;
      const dates = matches.map(l=>l.date).filter(Boolean);
      if(dates.length===0) return;
      const minDate = new Date(Math.min(...dates.map(d=>d.getTime())));
      if(minDate.getFullYear()===now.getFullYear() && minDate.getMonth()===now.getMonth()) count++;
    });
    return count;
  }
  function renderKPIs(){
    const rowEl = document.getElementById(`${ns}-kpiRow`);
    rowEl.innerHTML = cfg.kpiCards.map((k)=>{
      const val = kpiValue(k.type);
      const display = isMoneyType(k.type) ? fmtD(val) : val;
      const clickAttr = k.clickable ? `onclick="boards['${ns}'].showSub('${k.clickable}')"` : '';
      return `<div class="kpi boxed ${k.clickable?'clickable':''}" ${clickAttr}>
        <div class="num ${isMoneyType(k.type)?'mono':''}">${display}</div>
        <div class="label">${k.label}${k.clickable?' →':''}</div>
      </div>`;
    }).join('');
  }

  function projOngoingRev(name){
    return rows.filter(r=>r.proj===name && r.status==='合作中').reduce((s,r)=>s+r.quoteTWD,0);
  }

  function renderPMDropdown(){
    const panel = document.getElementById(`${ns}-pmDropdownPanel`);
    panel.innerHTML = pmList.map(pm=>`<label class="pm-option"><input type="checkbox" data-pm="${pm}" checked> ${pm}</label>`).join('')
      + `<div class="pm-dropdown-foot"><span data-act="all">全選</span><span data-act="none">清空</span></div>`;
    panel.querySelectorAll('input[type=checkbox]').forEach(cb=>{
      cb.onchange = ()=>{
        if(cb.checked) activePMs.add(cb.dataset.pm); else activePMs.delete(cb.dataset.pm);
        updatePMBtnLabel(); renderProjCards();
      };
    });
    panel.querySelector('[data-act=all]').onclick = ()=>{
      activePMs = new Set(pmList);
      panel.querySelectorAll('input').forEach(cb=>cb.checked=true);
      updatePMBtnLabel(); renderProjCards();
    };
    panel.querySelector('[data-act=none]').onclick = ()=>{
      activePMs = new Set();
      panel.querySelectorAll('input').forEach(cb=>cb.checked=false);
      updatePMBtnLabel(); renderProjCards();
    };
  }
  function updatePMBtnLabel(){
    const btn = document.getElementById(`${ns}-pmDropdownBtn`);
    const label = activePMs.size===pmList.length ? '全部' : activePMs.size===0 ? '未選擇' : `已選 ${activePMs.size} 位`;
    btn.textContent = `PM 篩選：${label}`;
  }
  document.getElementById(`${ns}-pmDropdownBtn`).onclick = (e)=>{ e.stopPropagation(); document.getElementById(`${ns}-pmDropdownPanel`).classList.toggle('open'); };
  document.addEventListener('click', ()=> document.getElementById(`${ns}-pmDropdownPanel`).classList.remove('open'));
  document.getElementById(`${ns}-pmDropdownPanel`).addEventListener('click', e=> e.stopPropagation());

  function renderProjCards(){
    const row = document.getElementById(`${ns}-projCardRow`);
    row.innerHTML = '';
    const filtered = projects.filter(p=>activePMs.has(p.pm));
    if(filtered.length===0){ row.innerHTML = '<div style="color:var(--ink-soft);font-size:13px;padding:12px;">沒有符合篩選條件的專案</div>'; return; }
    filtered.forEach(p=>{
      const rev = projOngoingRev(p.name);
      const card = document.createElement('div');
      card.className = `proj-card stripe-${p.stage}` + (selectedProj===p.name ? ' selected' : '');
      card.innerHTML = `
        <h4>${p.name}</h4>
        <div class="prow"><span class="k">平台</span><span>${p.platform}</span></div>
        <div class="prow"><span class="k">需求人數</span><span>${p.count}</span></div>
        <div class="prow"><span class="k">預計合作時間</span><span class="mono">${p.due}</span></div>
        <div class="prow rev"><span class="k">合作中業績</span><span class="v">${rev>0 ? fmtD(rev) : '—'}</span></div>`;
      card.onclick = ()=>{ selectedProj = p.name; renderProjCards(); openDetail(p); };
      row.appendChild(card);
    });
  }

  function openDetail(p){
    document.getElementById(`${ns}-detailPanel`).classList.add('open');
    document.getElementById(`${ns}-detailTitle`).textContent = p.name;
    document.getElementById(`${ns}-infoGrid`).innerHTML = `
      <div class="info-field"><div class="k">需求平台</div><div class="v">${p.platform}</div></div>
      <div class="info-field"><div class="k">人數</div><div class="v">${p.count}</div></div>
      <div class="info-field"><div class="k">執行PM</div><div class="v">${p.pm||'—'}</div></div>
      <div class="info-field"><div class="k">業務/營運PM</div><div class="v">${p.bizOps||'—'}</div></div>
      <div class="info-field"><div class="k">需求說明</div><div class="v">${p.demand}</div></div>
      <div class="info-field"><div class="k">填寫日期</div><div class="v">${p.coopTime}</div></div>
    `;
    const matched = rows.filter(r=>r.proj===p.name);
    document.getElementById(`${ns}-projDetailBody`).innerHTML = matched.length
      ? matched.map(r => `<tr>${cfg.detailColumns.map(c=>`<td>${c.render(r)}</td>`).join('')}</tr>`).join('')
      : `<tr><td colspan="${cfg.detailColumns.length}" style="text-align:center;color:var(--ink-soft);padding:20px;">此廠商目前沒有執行項目資料</td></tr>`;
  }

  /* Real monthly revenue trend, derived from 業績認列時間 across the trailing 6 months */
  function buildMonthBuckets(){
    const now = new Date();
    const buckets = [];
    for(let i=5;i>=0;i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      buckets.push({ y:d.getFullYear(), m:d.getMonth(), label:`${d.getMonth()+1}月`, 業績:0, 成本:0, 利潤:0, newCount:0 });
    }
    rows.forEach(r=>{
      const d = parseDate(r.recog);
      if(!d) return;
      const b = buckets.find(x=>x.y===d.getFullYear() && x.m===d.getMonth());
      if(!b) return;
      b.業績 += r.quoteTWD; b.成本 += r.costTWD; b.利潤 += r.profitTWD;
    });
    rows.forEach(it=>{
      const matches = logs.filter(l => norm(l.proj)===norm(it.proj) && norm(l.name)===norm(it.name));
      const dates = matches.map(l=>l.date).filter(Boolean);
      if(dates.length===0) return;
      const minDate = new Date(Math.min(...dates.map(d=>d.getTime())));
      const b = buckets.find(x=>x.y===minDate.getFullYear() && x.m===minDate.getMonth());
      if(b) b.newCount++;
    });
    return buckets;
  }
  const buckets = buildMonthBuckets();
  const revLabels = buckets.map(b=>b.label);
  const revData = { 業績: buckets.map(b=>b.業績), 成本: buckets.map(b=>b.成本), 利潤: buckets.map(b=>b.利潤) };
  const newCountData = buckets.map(b=>b.newCount);

  let revChart;
  function buildRevChart(keys){
    const colors = {業績:'#2B2B2B', 成本:'#D9D9D9', 利潤:'#61A6E1'};
    const datasets = keys.map(k => k==='利潤'
      ? {type:'line', label:'利潤', data:revData.利潤, borderColor:colors.利潤, backgroundColor:colors.利潤, tension:.3}
      : {type:'bar', label:k, data:revData[k], backgroundColor:colors[k], borderRadius:5, maxBarThickness:28});
    if(revChart) revChart.destroy();
    revChart = new Chart(document.getElementById(`${ns}-revChart`), {
      data:{ labels:revLabels, datasets },
      options:{ plugins:{legend:{position:'bottom', labels:{boxWidth:10,font:{size:11}}}},
        scales:{ y:{grid:{color:'#E5E5E5'}, ticks:{font:{family:'Inter',size:10}}},
          x:{grid:{display:false}, ticks:{font:{family:'Inter',size:10}}} } }
    });
  }
  buildRevChart(['業績','成本','利潤']);
  let revActive = new Set(['全部']);
  document.querySelectorAll(`#${ns}-revFilter .mini-toggle`).forEach(btn=>{
    btn.onclick = ()=>{
      const k = btn.dataset.k;
      if(k==='全部'){ revActive = new Set(['全部']); }
      else { revActive.delete('全部'); if(revActive.has(k)) revActive.delete(k); else revActive.add(k); if(revActive.size===0) revActive.add('全部'); }
      document.querySelectorAll(`#${ns}-revFilter .mini-toggle`).forEach(b=> b.classList.toggle('on', revActive.has(b.dataset.k)));
      buildRevChart(revActive.has('全部') ? ['業績','成本','利潤'] : [...revActive]);
    };
  });

  new Chart(document.getElementById(`${ns}-newInfChart`), {
    type:'bar',
    data:{ labels:revLabels, datasets:[{data:newCountData, backgroundColor:'#F5C242', borderRadius:5, maxBarThickness:26}] },
    options:{ plugins:{legend:{display:false}}, scales:{
      y:{beginAtZero:true, grid:{color:'#E5E5E5'}, ticks:{font:{family:'Inter',size:10}}},
      x:{grid:{display:false}, ticks:{font:{family:'Inter',size:10}}} } }
  });

  const pmCounts = {};
  rows.forEach(r=>{ if(r.pm) pmCounts[r.pm] = (pmCounts[r.pm]||0)+1; });
  const pmStats = Object.entries(pmCounts).map(([pm,count])=>({pm,count})).sort((a,b)=>b.count-a.count);
  const maxCount = Math.max(1, ...pmStats.map(p=>p.count));
  document.getElementById(`${ns}-pmTable`).innerHTML = pmStats.length
    ? '<tr><th>PM</th><th>執行項目數</th></tr>' + pmStats.map(p=>`<tr><td>${p.pm}<div class="bar-mini" style="width:${(p.count/maxCount*100).toFixed(0)}%"></div></td><td class="mono">${p.count}</td></tr>`).join('')
    : '<tr><td style="padding:16px;color:var(--ink-soft);">尚無資料</td></tr>';

  renderKPIs(); renderTable(); renderPMDropdown(); updatePMBtnLabel(); renderProjCards();

  return { showSub, rows, projects,
    monthRev: ()=> kpiValue('monthRev'),
    videoCount: ()=> kpiValue('activeCount') };
}

/* ================= Column configs ================= */
const infColumns = [
  {label:'狀態', render:r=>statusTag(r.status)},
  {label:'網紅 / 專案', render:r=>`<div class="name-cell"><div class="name">${r.name}</div><div class="proj">${r.proj}</div></div>`},
  {label:'PM', render:r=>r.pm||'—'},
  {label:'最新動態', render:r=>r.latest},
  {label:'網紅報價', render:r=>moneyCell(r.costAmt, r.costCur)},
  {label:'對外報價', render:r=>moneyCell(r.quoteAmt, r.quoteCur)},
  {label:'業績認列時間', render:r=>`<span class="mono">${r.recog||'—'}</span>`},
  {label:'利潤', render:r=>profitCell(r.profitTWD)},
];
const infDetailColumns = [
  {label:'狀態', render:r=>statusTag(r.status)},
  {label:'網紅', render:r=>`<div class="name-cell"><div class="name">${r.name}</div></div>`},
  {label:'PM', render:r=>r.pm||'—'},
  {label:'最新動態', render:r=>r.latest},
  {label:'網紅報價', render:r=>moneyCell(r.costAmt, r.costCur)},
  {label:'對外報價', render:r=>moneyCell(r.quoteAmt, r.quoteCur)},
  {label:'業績認列時間', render:r=>`<span class="mono">${r.recog||'—'}</span>`},
  {label:'利潤', render:r=>profitCell(r.profitTWD)},
];
const bsColumns = [
  {label:'狀態', render:r=>statusTag(r.status)},
  {label:'PM', render:r=>r.pm||'—'},
  {label:'廠商名稱', render:r=>`<div class="name-cell"><div class="name">${r.proj}</div></div>`},
  {label:'產品', render:r=>r.name},
  {label:'業務/營運PM', render:r=>r.bizOps||'—'},
  {label:'最新動態', render:r=>r.latest},
  {label:'執行成本', render:r=>moneyCell(r.costAmt, r.costCur)},
  {label:'對外報價', render:r=>moneyCell(r.quoteAmt, r.quoteCur)},
  {label:'業績認列時間', render:r=>`<span class="mono">${r.recog||'—'}</span>`},
  {label:'利潤', render:r=>profitCell(r.profitTWD)},
  {label:'配合服務商', render:r=>r.partner},
  {label:'備註', render:r=>`<span class="note-cell">${r.note}</span>`},
];
const bsDetailColumns = [
  {label:'狀態', render:r=>statusTag(r.status)},
  {label:'PM', render:r=>r.pm||'—'},
  {label:'產品', render:r=>r.name},
  {label:'業務/營運PM', render:r=>r.bizOps||'—'},
  {label:'最新動態', render:r=>r.latest},
  {label:'執行成本', render:r=>moneyCell(r.costAmt, r.costCur)},
  {label:'對外報價', render:r=>moneyCell(r.quoteAmt, r.quoteCur)},
  {label:'業績認列時間', render:r=>`<span class="mono">${r.recog||'—'}</span>`},
  {label:'利潤', render:r=>profitCell(r.profitTWD)},
  {label:'配合服務商', render:r=>r.partner},
  {label:'備註', render:r=>`<span class="note-cell">${r.note}</span>`},
];

const boards = {};

function renderOverview(infRows, infProjects, bsRows, bsProjects){
  const now = new Date();
  const monthRevOf = rows => rows.filter(r=>{ const d=parseDate(r.recog); return d && d.getFullYear()===now.getFullYear() && d.getMonth()===now.getMonth(); }).reduce((s,r)=>s+r.quoteTWD,0);
  const activeCountOf = rows => rows.filter(r=>r.status!=='已結案' && r.status!=='不合作').length;

  const infRev = monthRevOf(infRows), bsRev = monthRevOf(bsRows);
  const totalProj = infProjects.length + bsProjects.length;
  const totalVideo = activeCountOf(infRows) + activeCountOf(bsRows);

  document.getElementById('overviewBignums').innerHTML = `
    <div class="bignum"><div class="num mono">${fmtD(infRev+bsRev)}</div><div class="label">本月業績合計</div></div>
    <div class="bignum"><div class="num">${totalProj}</div><div class="label">進行中專案數合計</div></div>
    <div class="bignum"><div class="num">${totalVideo}</div><div class="label">進行中影片數合計</div></div>
  `;
  document.getElementById('ovInfProj').textContent = infProjects.length;
  document.getElementById('ovInfVideo').textContent = activeCountOf(infRows);
  document.getElementById('ovInfRev').textContent = fmtD(infRev);
  document.getElementById('ovBSProj').textContent = bsProjects.length;
  document.getElementById('ovBSVideo').textContent = activeCountOf(bsRows);
  document.getElementById('ovBSRev').textContent = fmtD(bsRev);
}

/* ================= Load & boot ================= */
async function boot(force){
  const btn = document.getElementById('refreshBtn');
  if(force){
    btn.disabled = true;
    btn.textContent = '更新中...';
    document.getElementById('errorState').innerHTML = '';
  }
  try{
    const url = force ? `${APPSCRIPT_URL}?force=1&t=${Date.now()}` : APPSCRIPT_URL;
    const res = await fetch(url, { cache: 'no-store' });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();

    const rawProjects = data['專案需求'] || [];
    const rawItems = data['執行項目表'] || [];
    const rawLogs = data['進度日誌'] || [];

    const allProjects = rawProjects.map(mapProject);
    const allItems = rawItems.map(mapItem);
    const allLogs = rawLogs.map(o=>({
      proj: getVal(o,['廠商名稱']),
      name: getVal(o,['網紅 / 產品名稱','網紅／產品名稱','網紅/產品名稱']),
      date: parseDate(getVal(o,['日期'])),
    }));

    const infProjects = allProjects.filter(p=>norm(p.service)===norm('跨境網紅'));
    const bsProjects = allProjects.filter(p=>norm(p.service)===norm('買家秀'));
    const infRows = allItems.filter(r=>norm(r.service)===norm('跨境網紅'));
    const bsRows = allItems.filter(r=>norm(r.service)===norm('買家秀'));

    boards['influencer'] = ServiceBoard('influencer', {
      rows: infRows, projects: infProjects, logs: allLogs,
      columns: infColumns, detailColumns: infDetailColumns,
      newCountLabel: '網紅新增數量（每月，依進度日誌首次出現月份估算）',
      kpiCards: [
        {type:'monthRev', label:'本月業績', clickable:'rev'},
        {type:'ongoingRev', label:'合作中業績'},
        {type:'activeCount', label:'進行中'},
        {type:'projCount', label:'專案數', clickable:'proj'},
        {type:'newCount', label:'本月增加名單數'},
      ],
    });
    boards['buyershow'] = ServiceBoard('buyershow', {
      rows: bsRows, projects: bsProjects, logs: allLogs,
      columns: bsColumns, detailColumns: bsDetailColumns,
      newCountLabel: '拍攝新增數量（每月，依進度日誌首次出現月份估算）',
      kpiCards: [
        {type:'monthRev', label:'本月業績', clickable:'rev'},
        {type:'projCount', label:'進行中專案數', clickable:'proj'},
        {type:'activeCount', label:'進行中影片數'},
      ],
    });

    renderOverview(infRows, infProjects, bsRows, bsProjects);

    document.getElementById('lastUpdated').textContent = new Date().toLocaleString('zh-TW', {hour12:false});
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  } catch(err){
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('errorState').innerHTML =
      `<div class="error-state">讀取 Google Sheet 資料失敗：${err.message}。請確認 Apps Script 已部署為「所有人」可存取，或稍後重新整理頁面再試一次。</div>`;
  } finally {
    if(force){ btn.disabled = false; btn.textContent = '↻ 強制更新'; }
  }
}
document.getElementById('refreshBtn').onclick = ()=> boot(true);
boot();
</script>
